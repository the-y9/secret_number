<!DOCTYPE html>
<html>
<head>
  <title>Number Guesser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game">
    <h1>AI Number Guesser</h1>

    <h2 id="guess">Think of a number...</h2>

    <div class="buttons">
      <button onclick="handleResponse('higher')">Higher</button>
      <button onclick="handleResponse('lower')">Lower</button>
      <button onclick="handleResponse('correct')">Correct</button>
    </div>

    <p id="attempts"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
